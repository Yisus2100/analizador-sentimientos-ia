name: CI/CD - Analizador de Sentimientos

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-build-test:
    name: Backend - Build y Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: analizador_sentimientos_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build y tests del backend
        working-directory: ./backend
        run: ./mvnw clean install
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/analizador_sentimientos_test
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: postgres

  frontend-build:
    name: Frontend - Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        working-directory: ./frontend
        run: npm ci

      - name: Build del frontend
        working-directory: ./frontend
        run: npm run build

      - name: Dar permisos de ejecución a mvnw
        working-directory: ./backend
        run: chmod +x mvnw

      - name: Build y tests del backend
        working-directory: ./backend
        run: ./mvnw clean install
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/analizador_sentimientos_test
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: postgres